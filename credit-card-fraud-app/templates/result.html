<!DOCTYPE html>
<html>

<head>

<title>Prediction Result</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Prediction Result</h1>

{% if "Fraud" in prediction %}

<p class="fraud">🚨 Fraudulent Transaction Detected</p>

{% else %}

<p class="safe">✅ Safe Transaction</p>

{% endif %}

<br>

<a href="/">
<button>Check Another Transaction</button>
</a>

</div>

</body>

</html>
